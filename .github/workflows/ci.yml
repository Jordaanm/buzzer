name: CI

on:
  pull_request:
    branches: [master]

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Typecheck server
        run: npx tsc --noEmit
        working-directory: server

      - name: Typecheck client
        run: npx tsc --noEmit
        working-directory: client
